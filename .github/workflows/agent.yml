name: agent

# Autonomous implementation, gated by an admin comment.
#   1. Label an issue `polypus-go` → the `estimate` job posts the cost estimate
#      as an issue comment and asks the owner to approve.
#   2. The repo OWNER comments `/polypus approve` on the issue → the `implement`
#      job runs: implements headless, gates on the local CI, patch-bumps the
#      version, and opens a PR (which, on merge, auto-releases to npm).
#
# Only the OWNER's `/polypus approve` comment can start an implementation — no
# Environment/reviewer config needed. There is no spend cap: the estimate plus
# your approval comment are the control.
#
# Setup:
#   - Secret OPENROUTER_API_KEY — model API key (required).
#   - Secret POLYPUS_PR_TOKEN   — PAT (repo scope) to open the PR / trigger publish.
#   - Variable POLYPUS_AGENT_MODEL — OpenRouter model id (optional; cheap default below).

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue:
        description: "Issue number to estimate"
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  AGENT_MODEL: ${{ vars.POLYPUS_AGENT_MODEL || 'deepseek/deepseek-chat-v3-0324' }}

jobs:
  # 1) Estimate the effort/cost and ask the owner to approve via a comment.
  estimate:
    if: >
      github.repository == 'GaberRB/polypus' &&
      ((github.event_name == 'issues' && github.event.label.name == 'polypus-go') ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    env:
      ISSUE: ${{ github.event.issue.number || github.event.inputs.issue }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Configure the Polypus agent (cheap OpenRouter model)
        run: |
          node dist/index.js add-agent ci --provider openrouter --model "$AGENT_MODEL" \
            --api-key '${OPENROUTER_API_KEY}' --set-default
      - name: Estimate effort/cost and ask for approval
        run: |
          gh issue view "$ISSUE" -R "$GITHUB_REPOSITORY" --json title -q .title > issue-title.txt
          gh issue view "$ISSUE" -R "$GITHUB_REPOSITORY" --json body  -q .body  > issue-body.txt
          { echo "Implement GitHub issue #$ISSUE: $(cat issue-title.txt)"; echo; cat issue-body.txt; } > task.md
          node dist/index.js estimate "$(cat task.md)" --json > est.json || echo '{}' > est.json
          rm -f issue-title.txt issue-body.txt task.md
          node <<'NODE'
          const fs = require("fs");
          let e = {};
          try { e = (JSON.parse(fs.readFileSync("est.json", "utf8")).estimate) || {}; } catch {}
          const body = [
            "🧮 **Estimativa do Polypus** (modelo `" + (process.env.AGENT_MODEL || "") + "`)",
            "",
            "| | |",
            "|---|---|",
            "| Complexidade | **" + (e.complexity || "?") + "** |",
            "| Passos estimados | ~" + (e.estimatedSteps ?? "?") + " |",
            "| Tokens estimados | ~" + (e.estimatedTokens ?? "?") + " |",
            "| Custo estimado | **" + (e.costLabel || "?") + "** |",
            e.rationale ? "\n> " + e.rationale : "",
            e.risks ? "\n> ⚠ " + e.risks : "",
            "",
            "▶ Para **aprovar e implementar**, comente **`/polypus approve`** nesta issue.",
            "_Apenas o dono do repositório (admin) pode aprovar. Sem aprovação, nada é implementado._",
          ].join("\n");
          fs.writeFileSync("comment.md", body);
          NODE
          gh issue comment "$ISSUE" -R "$GITHUB_REPOSITORY" --body-file comment.md
          rm -f est.json comment.md

  # 2) Implement — only when the repo OWNER comments `/polypus approve`.
  implement:
    if: >
      github.repository == 'GaberRB/polypus' &&
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request == null &&
      github.event.comment.author_association == 'OWNER' &&
      startsWith(github.event.comment.body, '/polypus approve') &&
      contains(github.event.issue.labels.*.name, 'polypus-go')
    runs-on: ubuntu-latest
    env:
      ISSUE: ${{ github.event.issue.number }}
      MAX_STEPS: ${{ vars.POLYPUS_MAX_STEPS || '120' }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Acknowledge the approval
        # Runs before checkout, so gh can't infer the repo from a git remote —
        # point it at the repository explicitly.
        run: gh issue comment "$ISSUE" -R "$GITHUB_REPOSITORY" --body "✅ Aprovado por @${{ github.event.comment.user.login }} — implementando…"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Configure the Polypus agent (cheap OpenRouter model)
        run: |
          node dist/index.js add-agent ci --provider openrouter --model "$AGENT_MODEL" \
            --api-key '${OPENROUTER_API_KEY}' --set-default

      - name: Run Polypus headless to implement the issue
        run: |
          gh issue view "$ISSUE" -R "$GITHUB_REPOSITORY" --json title -q .title > issue-title.txt
          gh issue view "$ISSUE" -R "$GITHUB_REPOSITORY" --json body  -q .body  > issue-body.txt
          {
            echo "Implement GitHub issue #$ISSUE: $(cat issue-title.txt)"
            echo
            cat issue-body.txt
            echo
            echo "Follow the repository conventions in .poly/agents.md, context.md and rules.md."
            echo "Make a focused change that satisfies the issue, keep the diff minimal, and do"
            echo "not touch unrelated files. The project's typecheck, build and tests must pass."
          } > task.md
          echo "::group::Polypus run"
          node dist/index.js run "$(cat task.md)" \
            --mode bypass --verify --json --max-steps "$MAX_STEPS" \
            > polypus-result.json || true
          echo "::endgroup::"
          rm -f issue-title.txt issue-body.txt task.md
          node -e "try{const r=require('./polypus-result.json');console.log('reason:',r.result.reason,'| steps:',r.result.steps,'| files:',(r.result.filesChanged||[]).join(', '))}catch(e){console.log('no structured result')}"
          rm -f polypus-result.json

      - name: Abort if no changes were produced
        id: changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            gh issue comment "$ISSUE" -R "$GITHUB_REPOSITORY" --body "🤖 Polypus ran but produced no tracked changes for this issue."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Self-correction loop: review the diff, feed any blocking findings back to
      # the agent to fix, then re-validate. The agent evaluates each finding (the
      # reviewer is a free model and can be wrong), and the local CI is the judge.
      # At most 2 fix passes; if blockers remain, the PR is opened flagged for a
      # human (see the note in "Open the pull request").
      - name: Self-review loop — fix blocking findings (max 2 passes)
        if: steps.changes.outputs.changed == 'true'
        id: selfreview
        env:
          REVIEW_PASSES: "2"
        run: |
          final_blocking=0
          for pass in $(seq 0 "$REVIEW_PASSES"); do
            echo "::group::Auto-review (#$((pass + 1)))"
            git add -A
            git diff --cached > selfreview.patch
            node dist/index.js review HEAD --input selfreview.patch --json \
              > review.json || echo '{"blocking":[]}' > review.json
            COUNT=$(node -e "try{const r=require('./review.json');console.log((r.blocking||[]).length)}catch{console.log(0)}")
            echo "Blocking findings: $COUNT"
            echo "::endgroup::"
            [ "$COUNT" = "0" ] && { final_blocking=0; break; }
            if [ "$pass" -ge "$REVIEW_PASSES" ]; then final_blocking="$COUNT"; break; fi
            node -e "const r=require('./review.json');const l=(r.blocking||[]).map((b,i)=>(i+1)+'. '+(b.file?'['+b.file+'] ':'')+b.issue);require('fs').writeFileSync('blockers.txt',l.join('\n'))"
            {
              echo "An automated code review flagged these potential BLOCKING issues in your last change:"
              echo
              cat blockers.txt
              echo
              echo "Evaluate each finding critically — the reviewer is a free model and is sometimes wrong."
              echo "Fix only the ones that are genuine correctness/security bugs; if a finding is a false"
              echo "positive, leave that code unchanged. Do not touch unrelated code. Keep the diff minimal."
              echo "The project's typecheck, build and tests must still pass."
            } > fix-task.md
            echo "::group::Polypus fix pass $((pass + 1))"
            node dist/index.js run "$(cat fix-task.md)" \
              --mode bypass --verify --json --max-steps "$MAX_STEPS" > fix-result.json || true
            echo "::endgroup::"
            npm run typecheck && npm run build && npm test
          done
          rm -f selfreview.patch review.json blockers.txt fix-task.md fix-result.json
          echo "blocking_left=$final_blocking" >> "$GITHUB_OUTPUT"

      - name: Guard-rail — no secrets in the diff
        if: steps.changes.outputs.changed == 'true'
        run: |
          if git diff | grep -E -- '-----BEGIN [A-Z ]*PRIVATE KEY-----|AKIA[0-9A-Z]{16}|gh[pousr]_[A-Za-z0-9]{36}|sk-[A-Za-z0-9]{32}'; then
            echo "::error::A possible secret was found in the diff — refusing to open a PR."
            exit 1
          fi

      - name: CI gate — typecheck, build, tests must pass
        if: steps.changes.outputs.changed == 'true'
        run: |
          npm run typecheck
          npm run build
          npm test

      - name: Prepare release (patch bump + changelog + context)
        if: steps.changes.outputs.changed == 'true'
        run: |
          TITLE=$(gh issue view "$ISSUE" -R "$GITHUB_REPOSITORY" --json title -q .title)
          node scripts/prepare-release.mjs "$TITLE" "$ISSUE"
          npm run context

      - name: Open the pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.POLYPUS_PR_TOKEN || github.token }}
        run: |
          TITLE=$(gh issue view "$ISSUE" -R "$GITHUB_REPOSITORY" --json title -q .title)
          BRANCH="polypus/issue-$ISSUE"
          git config user.name "polypus-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "feat: implement #$ISSUE (Closes #$ISSUE)" \
            -m "Autonomous implementation by Polypus (model: $AGENT_MODEL)."
          git push -u origin "$BRANCH"
          VERSION=$(node -p "require('./package.json').version")
          NOTE=""
          if [ "${{ steps.selfreview.outputs.blocking_left }}" != "0" ] && [ -n "${{ steps.selfreview.outputs.blocking_left }}" ]; then
            NOTE="> ⚠ **Revisão manual necessária:** após 2 tentativas de auto-correção, o review automático ainda apontou ${{ steps.selfreview.outputs.blocking_left }} possível(is) problema(s) bloqueante(s). Confira antes de mergear."$'\n\n'
          fi
          BODY="${NOTE}$(printf 'Autonomous implementation by Polypus for #%s, approved via comment and gated on the local CI.\n\nModel: `%s`. Includes a patch bump to **v%s** + CHANGELOG. **Merging this PR auto-releases v%s to npm.**\n\nCloses #%s' "$ISSUE" "$AGENT_MODEL" "$VERSION" "$VERSION" "$ISSUE")"
          if gh pr create -R "$GITHUB_REPOSITORY" --base main --head "$BRANCH" --title "feat: $TITLE (Closes #$ISSUE)" --body "$BODY"; then
            echo "✓ Pull request opened."
          else
            COMPARE="${{ github.server_url }}/${{ github.repository }}/compare/main...$BRANCH?expand=1"
            echo "::warning::Could not open the PR automatically — posting the branch link on the issue."
            gh issue comment "$ISSUE" -R "$GITHUB_REPOSITORY" --body "🤖 Polypus pushed an implementation to \`$BRANCH\` (CI gate passed) but couldn't open the PR automatically. Open it here: $COMPARE"
          fi
