name: agent

# Autonomous implementation: when an issue is labeled `polypus-go`, run Polypus
# headless to implement it, gate on the local CI, and open a PR with `Closes #N`.
#
# Setup:
#   - Secret  OPENROUTER_API_KEY  — model API key (required).
#   - Secret  POLYPUS_PR_TOKEN    — optional PAT (repo scope) used to open the PR.
#       Use this OR enable "Allow GitHub Actions to create and approve pull
#       requests" (Settings → Actions → General). Without either, the run still
#       succeeds and comments the branch link on the issue instead of failing.
#   - Variable POLYPUS_AGENT_MODEL — OpenRouter model id (optional; cheap default below).
#   - Variable POLYPUS_BUDGET_USD  — per-run USD cap (optional; default 0.50).
#   - Create a `polypus-go` label and add it to an issue to trigger this.
# The linked issue should also carry `accepted` so the opened PR passes require-issue.

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue:
        description: "Issue number to implement"
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  implement:
    # Guard-rail: only our own repo, and only the opt-in trigger label.
    if: >
      github.repository == 'GaberRB/polypus' &&
      (github.event_name == 'workflow_dispatch' || github.event.label.name == 'polypus-go')
    runs-on: ubuntu-latest
    env:
      ISSUE: ${{ github.event.issue.number || github.event.inputs.issue }}
      AGENT_MODEL: ${{ vars.POLYPUS_AGENT_MODEL || 'deepseek/deepseek-chat-v3-0324' }}
      BUDGET_USD: ${{ vars.POLYPUS_BUDGET_USD || '0.50' }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Configure the Polypus agent (cheap OpenRouter model)
        run: |
          node dist/index.js add-agent ci \
            --provider openrouter \
            --model "$AGENT_MODEL" \
            --api-key '${OPENROUTER_API_KEY}' \
            --set-default

      - name: Run Polypus headless to implement the issue
        run: |
          gh issue view "$ISSUE" --json title -q .title > issue-title.txt
          gh issue view "$ISSUE" --json body  -q .body  > issue-body.txt
          {
            echo "Implement GitHub issue #$ISSUE: $(cat issue-title.txt)"
            echo
            cat issue-body.txt
            echo
            echo "Follow the repository conventions in .poly/agents.md, context.md and rules.md."
            echo "Make a focused change that satisfies the issue, keep the diff minimal, and do"
            echo "not touch unrelated files. The project's typecheck, build and tests must pass."
          } > task.md
          echo "::group::Polypus run"
          node dist/index.js run "$(cat task.md)" \
            --mode bypass --verify --json \
            --max-steps 40 --budget "$BUDGET_USD" \
            > polypus-result.json || true
          echo "::endgroup::"
          rm -f issue-title.txt issue-body.txt task.md
          node -e "try{const r=require('./polypus-result.json');console.log('reason:',r.result.reason,'| steps:',r.result.steps,'| files:',(r.result.filesChanged||[]).join(', '))}catch(e){console.log('no structured result')}"
          rm -f polypus-result.json

      - name: Abort if no changes were produced
        id: changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            gh issue comment "$ISSUE" --body "🤖 Polypus ran but produced no changes for this issue."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Guard-rail — no secrets in the diff
        if: steps.changes.outputs.changed == 'true'
        run: |
          if git diff | grep -E -- '-----BEGIN [A-Z ]*PRIVATE KEY-----|AKIA[0-9A-Z]{16}|gh[pousr]_[A-Za-z0-9]{36}|sk-[A-Za-z0-9]{32}'; then
            echo "::error::A possible secret was found in the diff — refusing to open a PR."
            exit 1
          fi

      - name: CI gate — typecheck, build, tests must pass
        if: steps.changes.outputs.changed == 'true'
        run: |
          npm run typecheck
          npm run build
          npm test

      - name: Open the pull request
        if: steps.changes.outputs.changed == 'true'
        # Prefer a PAT (POLYPUS_PR_TOKEN) so the PR can be created even when the
        # repo setting "Allow GitHub Actions to create and approve pull requests"
        # is off; fall back to the default token otherwise.
        env:
          GH_TOKEN: ${{ secrets.POLYPUS_PR_TOKEN || github.token }}
        run: |
          TITLE=$(gh issue view "$ISSUE" --json title -q .title)
          BRANCH="polypus/issue-$ISSUE"
          git config user.name "polypus-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "feat: implement #$ISSUE (Closes #$ISSUE)" \
            -m "Autonomous implementation by Polypus (model: $AGENT_MODEL)."
          git push -u origin "$BRANCH"
          BODY=$(printf 'Autonomous implementation by Polypus for #%s, generated headlessly and gated on the local CI (typecheck/build/test).\n\nModel: `%s`. Please review before merging.\n\nCloses #%s' "$ISSUE" "$AGENT_MODEL" "$ISSUE")
          # Never hard-fail the job on PR creation: if the token may not open PRs
          # (Actions PR-create disabled and no PAT), post the compare link instead.
          if gh pr create --base main --head "$BRANCH" --title "feat: $TITLE (Closes #$ISSUE)" --body "$BODY"; then
            echo "✓ Pull request opened."
          else
            COMPARE="${{ github.server_url }}/${{ github.repository }}/compare/main...$BRANCH?expand=1"
            echo "::warning::Could not open the PR automatically — posting the branch link on the issue. To enable auto-PRs, turn on 'Allow GitHub Actions to create and approve pull requests' in Settings → Actions → General, or add a POLYPUS_PR_TOKEN secret (a PAT with repo scope)."
            gh issue comment "$ISSUE" --body "🤖 Polypus pushed an implementation to \`$BRANCH\` and it passed the CI gate, but the workflow couldn't open the PR automatically. Open it here: $COMPARE"
          fi
