name: auto-release

# Publish whenever main's package.json version has no Release yet. Triggers on
# any push to main — agent PR, manual PR, or dependabot — so publishing is gated
# on the *version* changing, not on the branch name. The created GitHub Release
# triggers release.yml, which publishes to npm.
#
# IMPORTANT: creating the Release must use a PAT (POLYPUS_PR_TOKEN), because a
# Release created with the default GITHUB_TOKEN does NOT trigger other workflows
# (release.yml would never run). Without the PAT, the tag/release is still made
# but you must publish manually (or re-run release.yml).

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: github.repository == 'GaberRB/polypus'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create the GitHub Release when this version has none yet
        env:
          # A PAT is required so the created Release triggers release.yml → npm publish.
          GH_TOKEN: ${{ secrets.POLYPUS_PR_TOKEN || github.token }}
        run: |
          VERSION="v$(node -p "require('./package.json').version")"
          # Idempotent: if this version was already released, this push didn't bump
          # the version (or it's a re-run) — nothing to publish.
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists — nothing to do."
            exit 0
          fi
          # Pull this version's notes out of the CHANGELOG, if present.
          NOTES=$(awk -v v="## [${VERSION#v}]" 'index($0,v)==1{f=1;next} /^## \[/{f=0} f' CHANGELOG.md)
          [ -z "$NOTES" ] && NOTES="Release $VERSION."
          gh release create "$VERSION" --target main --title "$VERSION" --notes "$NOTES"
          echo "Created Release $VERSION — release.yml will publish to npm."
          # Note: a Release created with the default GITHUB_TOKEN does not trigger
          # release.yml. Set the POLYPUS_PR_TOKEN PAT (used above) so npm publish runs.
